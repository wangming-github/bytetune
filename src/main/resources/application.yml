# JSON 文档：http://localhost:8080/v3/api-docs
# redoc文档 http://localhost:8080/redoc/api.html
# Swagger UI：http://localhost:8080/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs      # OpenAPI JSON 文档路径
  swagger-ui:
    path: /swagger-ui.html  # Swagger UI 页面路径



